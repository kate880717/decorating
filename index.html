<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>꾸며주는 말 탐험대 ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body { font-family: 'Outfit', 'Malgun Gothic', sans-serif; background: #d1fae5; }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #app {
      width: 100%; max-width: 980px; height: 96vh; max-height: 860px;
      display: flex; flex-direction: column; overflow: hidden;
      background: linear-gradient(145deg, #f0fdf4 0%, #ecfeff 100%);
      border-radius: 2.5rem; box-shadow: 0 30px 60px -15px rgba(0,0,0,0.25);
    }
    .card { background: #fff; border-radius: 2rem; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .card-green  { border: 3px solid #bbf7d0; }
    .card-teal   { border: 3px solid #99f6e4; }
    .card-amber  { border: 3px solid #fde68a; }
    .card-pink   { border: 3px solid #fbcfe8; }
    .word-keep { word-break: keep-all; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .float { animation: float 3.5s ease-in-out infinite; }
    .btn { transition: transform .15s; cursor: pointer; }
    .btn:active { transform: scale(.96); }
    .scroll-y { overflow-y: auto; }
    .scroll-y::-webkit-scrollbar { display: none; }
  </style>

  <script>
    /* ── GAS 웹앱 URL ─────────────────────────────── */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyKRf_2sipDDAIPlLzoMmxZpquaLgEtTEtzAVGSAUvEVMdWi-YlWDfJ2cZnS4SkcPumgQ/exec"; // ← GAS 배포 URL 입력

    const gasGet = async (action) => {
      try {
        const r = await fetch(`${GAS_URL}?action=${action}`, { redirect: 'follow' });
        return JSON.parse(await r.text());
      } catch(_) { return null; }
    };
    const gasPost = async (data) => {
      try {
        await fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
      } catch(_) {}
    };

    /* ── 기본 학생 목록 ─────────────────────────── */
    const SAMPLES = ['김민준', '이하은', '박서준', '최지아'];

    /* ── TTS (구글 한국어 여성 음성 우선) ──────────── */
    const speak = (text, on) => {
      if (!on || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 0.88; u.pitch = 1.05;
      const setVoice = () => {
        const voices = window.speechSynthesis.getVoices();
        // 구글 여성 음성 우선
        let v = voices.find(v => v.lang === 'ko-KR' && v.name.includes('Google') && v.name.includes('여'));
        if (!v) v = voices.find(v => v.lang === 'ko-KR' && v.name.includes('Google'));
        if (!v) v = voices.find(v => v.lang === 'ko-KR');
        if (v) u.voice = v;
      };
      if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => { setVoice(); window.speechSynthesis.speak(u); };
      } else {
        setVoice();
        window.speechSynthesis.speak(u);
      }
    };

    /* ── 꾸며주는 말 학습 DB ─────────────────────── */
    const WORD_DB = [
      { id:'펄럭펄럭', cat:'모양', emoji:'🦋', desc:'나비나 깃발이 가볍고 부드럽게 흔들리는 모양', ex:'나비가 펄럭펄럭 날아갑니다.' },
      { id:'쿨쿨',     cat:'소리', emoji:'😴', desc:'잠을 깊이 자면서 나는 부드럽고 규칙적인 숨소리', ex:'아기가 쿨쿨 자고 있어요.' },
      { id:'멍멍',     cat:'소리', emoji:'🐶', desc:'강아지가 짖을 때 나는 소리', ex:'강아지가 멍멍 짖어요.' },
      { id:'활짝',     cat:'모양', emoji:'🌻', desc:'꽃이나 창문이 크게 열린 모양', ex:'해바라기가 활짝 피었습니다.' },
      { id:'쌩쌩',     cat:'소리', emoji:'🌬️', desc:'바람이 빠르게 지나가는 소리', ex:'바람이 쌩쌩 불어요.' },
      { id:'반짝반짝', cat:'모양', emoji:'⭐', desc:'별이나 금처럼 빛이 나는 모양', ex:'별이 반짝반짝 빛나요.' },
      { id:'살금살금', cat:'모양', emoji:'🐱', desc:'남이 모르게 발소리를 내지 않고 걷는 모양', ex:'고양이가 살금살금 걸어요.' },
      { id:'알록달록', cat:'모양', emoji:'🎨', desc:'여러 가지 빛깔이 아름답게 섞인 모양', ex:'꽃이 알록달록 예쁘게 피었어요.' },
      { id:'깡충깡충', cat:'모양', emoji:'🐰', desc:'토끼처럼 발을 모아 가볍게 뛰는 모양', ex:'토끼가 깡충깡충 뛰어요.' },
      { id:'졸졸',     cat:'소리', emoji:'💧', desc:'물이 가늘게 흐르는 소리', ex:'시냇물이 졸졸 흘러요.' },
    ];

    /* ── 퀴즈 문제 ─────────────────────────────── */
    const QUIZ_Q = [
      { id:1, img:'🦋', before:'나비가', after:'날아갑니다.', opts:['펄럭펄럭','쿵쿵'], a:'펄럭펄럭', fb:'맞아! 나비 날개는 가볍게 "펄럭펄럭" 움직여요.', concept:'모양을 꾸며주는 말' },
      { id:2, img:'😴', before:'아기가', after:'자고 있어요.', opts:['쨍그랑','쿨쿨'], a:'쿨쿨', fb:'아기가 깊이 잠든 숨소리는 "쿨쿨"이에요.', concept:'소리를 꾸며주는 말' },
      { id:3, img:'🐶', before:'강아지가', after:'짖어요.', opts:['살금살금','멍멍'], a:'멍멍', fb:'강아지는 씩씩하게 "멍멍" 하고 짖어요.', concept:'소리를 꾸머주는 말' },
      { id:4, img:'🌻', before:'해바라기가', after:'피었습니다.', opts:['활짝','엉엉'], a:'활짝', fb:'꽃이 크게 핀 모양은 "활짝"이라고 해요.', concept:'모양을 꾸며주는 말' },
      { id:5, img:'🌬️', before:'바람이', after:'불어요.', opts:['반짝반짝','쌩쌩'], a:'쌩쌩', fb:'바람이 빠르게 지나가는 소리는 "쌩쌩"이에요.', concept:'소리를 꾸며주는 말' },
      { id:6, img:'⭐', before:'밤하늘에 별이', after:'빛나요.', opts:['반짝반짝','쿵쿵'], a:'반짝반짝', fb:'별처럼 빛나는 모양은 "반짝반짝"이에요.', concept:'모양을 꾸며주는 말' },
      { id:7, img:'🐱', before:'고양이가', after:'걸어요.', opts:['살금살금','멍멍'], a:'살금살금', fb:'소리 없이 걷는 모양은 "살금살금"이에요.', concept:'모양을 꾸며주는 말' },
      { id:8, img:'🎨', before:'꽃이', after:'예쁘게 피었어요.', opts:['알록달록','사각사각'], a:'알록달록', fb:'여러 색이 섞인 모양은 "알록달록"이에요.', concept:'모양을 꾸며주는 말' },
      { id:9, img:'🐰', before:'토끼가', after:'뛰어요.', opts:['깡충깡충','쌩쌩'], a:'깡충깡충', fb:'토끼처럼 뛰는 모양은 "깡충깡충"이에요.', concept:'모양을 꾸며주는 말' },
      { id:10,img:'💧', before:'시냇물이', after:'흘러요.', opts:['졸졸','알록달록'], a:'졸졸', fb:'물이 가늘게 흐르는 소리는 "졸졸"이에요.', concept:'소리를 꾸며주는 말' },
    ];

    /* ── 수료증 PNG 저장 ──────────────────────── */
    const downloadCert = (name, learned) => {
      const cv = document.createElement('canvas');
      cv.width = 1200; cv.height = 1500;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#f0fdf4'; ctx.fillRect(0,0,1200,1500);
      ctx.strokeStyle = '#34d399'; ctx.lineWidth = 40; ctx.strokeRect(40,40,1120,1420);
      ctx.strokeStyle = '#bbf7d0'; ctx.lineWidth = 15; ctx.strokeRect(70,70,1060,1360);
      ctx.textAlign = 'center';
      ctx.font = 'bold 90px sans-serif'; ctx.fillStyle = '#059669';
      ctx.fillText('🌿 수 료 증 🌿', 600, 230);
      ctx.font = 'bold 55px sans-serif'; ctx.fillStyle = '#1e293b';
      ctx.fillText('꾸며주는 말 탐험대 대모험', 600, 360);
      ctx.font = '900 85px sans-serif'; ctx.fillStyle = '#059669';
      ctx.fillText(`${name} 탐험가`, 600, 560);
      ctx.font = '48px sans-serif'; ctx.fillStyle = '#475569';
      ['위 탐험가는 문장을 생생하게 꾸며주는 말을', '바르게 사용하는 실력을 갖추었기에', '이 수료증을 수여합니다.'].forEach((l,i) => ctx.fillText(l, 600, 750 + i*88));
      if (learned && learned.length > 0) {
        ctx.font = 'bold 44px sans-serif'; ctx.fillStyle = '#059669';
        ctx.fillText('✨ 오늘 배운 꾸며주는 말 ✨', 600, 1060);
        const row = learned.join('  |  ');
        ctx.font = '40px sans-serif'; ctx.fillStyle = '#1e293b';
        ctx.fillText(row, 600, 1130);
      }
      ctx.font = '130px serif'; ctx.fillText('⭐📝⭐', 600, 1330);
      ctx.font = 'bold 42px sans-serif'; ctx.fillStyle = '#94a3b8';
      ctx.fillText(new Date().toLocaleDateString('ko-KR'), 600, 1440);
      const a = document.createElement('a');
      a.download = `수료증_${name}.png`;
      a.href = cv.toDataURL('image/png');
      a.click();
    };
  </script>
</head>
<body>
<div id="root"><div id="app"></div></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 홈 아이콘 ─────────────────────────────── */
const HomeIcon = () => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
);

/* ── 헤더 ──────────────────────────────────── */
const Header = ({ label, soundOn, toggleSound }) => (
  <div className="flex items-center justify-between px-6 py-4 shrink-0">
    <div className="flex items-center gap-3">
      <button onClick={() => window.location.reload()}
        className="btn flex items-center justify-center w-10 h-10 bg-white rounded-xl border-2 border-slate-100 text-slate-400 shadow-sm">
        <HomeIcon/>
      </button>
      <span className="text-base font-black text-slate-400 bg-white px-4 py-2 rounded-full border border-slate-100 shadow-sm">{label}</span>
    </div>
    <button onClick={toggleSound}
      className={`btn w-12 h-12 rounded-xl border-2 shadow-sm text-2xl ${soundOn ? 'bg-green-100 text-green-600 border-green-200' : 'bg-white text-slate-300 border-slate-100'}`}>
      {soundOn ? '🔊' : '🔇'}
    </button>
  </div>
);

/* ── 연필 마스코트 ────────────────────────── */
const Mascot = ({ size = 90 }) => (
  <svg width={size} height={size * 1.3} viewBox="0 0 100 130" fill="none">
    <rect x="38" y="10" width="24" height="90" rx="4" fill="#FBBF24" stroke="#92400E" strokeWidth="3"/>
    <rect x="38" y="10" width="24" height="15" rx="3" fill="#FDE68A"/>
    <polygon points="38,100 50,125 62,100" fill="#FCD34D" stroke="#92400E" strokeWidth="2"/>
    <polygon points="44,112 50,125 56,112" fill="#1e293b"/>
    <circle cx="46" cy="58" r="3" fill="#1e293b"/>
    <circle cx="54" cy="58" r="3" fill="#1e293b"/>
    <path d="M46 68 Q50 73 54 68" stroke="#92400E" strokeWidth="2" strokeLinecap="round"/>
    <path d="M38 40 C20 35 15 65 30 70" stroke="#86EFAC" strokeWidth="5" strokeLinecap="round" fill="none"/>
    <path d="M62 40 C80 35 85 65 70 70" stroke="#86EFAC" strokeWidth="5" strokeLinecap="round" fill="none"/>
  </svg>
);

/* ══════════════════════════════════════════════
   앱 본체
══════════════════════════════════════════════ */
const App = () => {
  const [phase,       setPhase]       = useState('loading');
  const [students,    setStudents]    = useState([]);
  const [student,     setStudent]     = useState('');
  const [soundOn,     setSoundOn]     = useState(false);
  const [micReady,    setMicReady]    = useState(false);

  // 개념 학습
  const [conceptList, setConceptList] = useState([]);
  const [conceptIdx,  setConceptIdx]  = useState(0);

  // 퀴즈
  const [qs,          setQs]          = useState([]);
  const [qIdx,        setQIdx]        = useState(0);
  const [fb,          setFb]          = useState(null);
  const [wrong,       setWrong]       = useState([]);
  const [history,     setHistory]     = useState([]);
  const [reviewMode,  setReviewMode]  = useState(false);

  // 별점 & 녹음
  const [stars,       setStars]       = useState(0);
  const [recStep,     setRecStep]     = useState('idle');
  const [recWord,     setRecWord]     = useState('');   // 녹음할 단어 선택
  const [audioUrl,    setAudioUrl]    = useState(null);
  const [audioB64,    setAudioB64]    = useState(null);
  const [saving,      setSaving]      = useState(false);
  const [saved,       setSaved]       = useState(false);

  const mrRef         = useRef(null);
  const chunksRef     = useRef([]);
  const permStreamRef = useRef(null);

  /* ── TTS 자동 읽기 ─────────────────────────── */
  useEffect(() => {
    if (!soundOn) return;
    if (phase === 'intro') speak('오늘의 공부 약속! 꾸며주는 말을 넣어 문장을 더 생생하게 만들어봐요!', true);
    else if (phase === 'concept' && conceptList.length > 0) {
      const w = conceptList[conceptIdx];
      if (w) speak(`${w.ex} 이럴 때 쓰는 꾸며주는 말은 "${w.id}". ${w.desc}`, true);
    }
    else if (phase === 'activity') {
      const list = reviewMode ? wrong : qs;
      const q = list[qIdx];
      if (q) speak(`${q.before}, 빈칸, ${q.after}. 알맞은 꾸며주는 말을 골라보세요.`, true);
    }
    else if (phase === 'self_rating') speak('오늘 꾸며주는 말 공부 어땠나요? 별표를 눌러 알려줘요!', true);
    else if (phase === 'recording') speak(`꾸며주는 말을 넣어 나만의 문장을 만들어 녹음해봐요!`, true);
    else if (phase === 'report') speak('수료증이 나왔어요! 정말 잘했어요!', true);
  }, [phase, conceptIdx, qIdx, soundOn]);

  /* ── 초기 로드 ─────────────────────────────── */
  useEffect(() => {
    const init = async () => {
      let names = SAMPLES;
      if (window.google?.script?.run) {
        names = await new Promise(res =>
          window.google.script.run
            .withSuccessHandler(l => res(l && l.length > 0 ? l : SAMPLES))
            .withFailureHandler(() => res(SAMPLES))
            .getStudentList()
        );
      } else if (GAS_URL) {
        try {
          const data = await gasGet('getStudentList');
          if (Array.isArray(data) && data.length > 0) names = data;
        } catch(_) {}
      }
      setStudents(names); setStudent(names[0]);
      setPhase('start');
    };
    init();
  }, []);

  /* ── 마이크 권한 ─────────────────────────────── */
  const requestMic = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      permStreamRef.current = stream;
      setMicReady(true);
    } catch(_) { alert('마이크 권한이 없습니다. 브라우저 설정에서 허용해 주세요.'); }
  };

  /* ── 레벨 선택 ─────────────────────────────── */
  const handleLevel = useCallback((count) => {
    const shuffled = [...QUIZ_Q].sort(() => Math.random() - .5)
      .slice(0, Math.min(count, QUIZ_Q.length))
      .map(q => ({ ...q, opts: [...q.opts].sort(() => Math.random() - .5) }));
    setQs(shuffled);

    const picked = [...WORD_DB].sort(() => Math.random() - .5).slice(0, 3);
    setConceptList(picked);
    setRecWord(picked[0]?.id || '');

    setQIdx(0); setFb(null); setWrong([]); setHistory([]);
    setReviewMode(false); setStars(0);
    setRecStep('idle'); setAudioUrl(null); setAudioB64(null); setSaved(false);
    setPhase('concept'); setConceptIdx(0);
  }, []);

  /* ── 퀴즈 ─────────────────────────────────── */
  const checkAns = useCallback((ua) => {
    const list = reviewMode ? wrong : qs;
    const q = list[qIdx];
    const ok = ua === q.a;
    if (!reviewMode) setHistory(h => [...h, { id: q.id, ok, word: q.a, concept: q.concept }]);
    if (ok) {
      setFb({ ok: true, msg: q.fb, concept: q.concept });
      if (reviewMode) setWrong(w => w.filter(x => x.id !== q.id));
      confetti({ particleCount: 80, spread: 55, origin: { y: .65 } });
      if (soundOn) speak(q.fb, true);
    } else {
      setFb({ ok: false });
      if (!wrong.find(x => x.id === q.id)) setWrong(w => [...w, q]);
      if (soundOn) speak('아쉬워요, 다시 생각해볼까요?', true);
    }
  }, [reviewMode, wrong, qs, qIdx, soundOn]);

  const nextQ = useCallback(() => {
    const list = reviewMode ? wrong : qs;
    setFb(null);
    if (qIdx < list.length - 1) setQIdx(q => q + 1);
    else if (reviewMode || wrong.length === 0) setPhase('self_rating');
    else setPhase('재도전안내');
  }, [reviewMode, wrong, qs, qIdx]);

  /* ── 녹음 ─────────────────────────────────── */
  const startRec = async () => {
    try {
      let stream = permStreamRef.current;
      if (!stream || stream.getAudioTracks().every(t => t.readyState === 'ended')) {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        permStreamRef.current = stream;
      }
      const mr = new MediaRecorder(stream);
      mrRef.current = mr; chunksRef.current = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        setAudioUrl(URL.createObjectURL(blob));
        const fr = new FileReader();
        fr.readAsDataURL(blob);
        fr.onloadend = () => { setAudioB64(fr.result.split(',')[1]); setRecStep('done'); };
      };
      mr.start(); setRecStep('rec');
    } catch(_) { alert('마이크를 사용할 수 없어요!'); }
  };
  const stopRec = () => {
    if (mrRef.current && mrRef.current.state !== 'inactive') mrRef.current.stop();
  };

  /* ── 저장 (1회) ─────────────────────────────── */
  const saveResult = async () => {
    if (saved) { setPhase('report'); return; }
    setSaving(true); setSaved(true);
    const learned = [...new Set(history.filter(h => h.ok).map(h => h.word))];
    const payload = { name: student, total: qs.length, correct: history.filter(h => h.ok).length,
                      words: learned, rating: stars, audioBase64: audioB64 };
    if (window.google?.script?.run) window.google.script.run.saveRecord(payload);
    else if (GAS_URL) await gasPost(payload);
    setSaving(false); setPhase('report');
  };

  const toggleSound = () => setSoundOn(s => !s);

  /* ══════════════════════════════════════════════
     화면 렌더링
  ══════════════════════════════════════════════ */
  if (phase === 'loading') return (
    <div className="w-full h-full flex items-center justify-center">
      <div className="w-14 h-14 border-4 border-green-100 border-t-green-500 rounded-full animate-spin"/>
    </div>
  );

  /* ── 시작 화면 ─────────────────────────────── */
  if (phase === 'start') return (
    <div className="w-full h-full flex flex-col items-center justify-center p-8 relative overflow-hidden"
         style={{background:'linear-gradient(145deg,#f0fdf4 0%,#ecfeff 100%)'}}>
      <div className="absolute top-8 left-8 text-7xl opacity-10 float">🖊️</div>
      <div className="absolute bottom-16 right-8 text-8xl opacity-10 float" style={{animationDelay:'.8s'}}>🌿</div>
      <Mascot size={110}/>
      <h1 className="text-5xl font-black text-slate-900 mt-5 mb-2 tracking-tight">
        꾸며주는 말 <span className="text-green-500">탐험대</span> ✨
      </h1>
      <p className="text-lg font-bold text-slate-400 mb-10">문장을 더 생생하게 만들어봐요!</p>

      <div className="card card-green w-full max-w-sm p-8 shadow-xl">
        <p className="text-center text-sm font-black text-green-400 tracking-widest mb-4">내 이름을 선택해요</p>
        <select value={student} onChange={e => setStudent(e.target.value)}
          className="w-full p-4 mb-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-2xl font-black text-slate-800 text-center focus:outline-none focus:border-green-300">
          {students.map(s => <option key={s} value={s}>{s}</option>)}
        </select>

        {!micReady ? (
          <button onClick={requestMic}
            className="btn w-full py-4 mb-4 bg-green-50 text-green-700 border-2 border-green-200 rounded-2xl font-black text-xl">
            🎙️ 마이크 준비하기 (녹음용)
          </button>
        ) : (
          <p className="text-center text-emerald-600 font-black text-lg mb-4">✅ 마이크 준비 완료!</p>
        )}

        <button onClick={() => { speak(`안녕하세요 ${student}!`, soundOn); setPhase('intro'); }}
          className="btn w-full py-5 bg-green-500 text-white rounded-2xl font-black text-3xl shadow-lg hover:bg-green-600">
          시작하기 ▶
        </button>
      </div>
    </div>
  );

  /* ── 인트로 ──────────────────────────────── */
  if (phase === 'intro') return (
    <div className="w-full h-full flex flex-col" style={{background:'#f0fdf4'}}>
      <Header label="🌿 시작" soundOn={soundOn} toggleSound={toggleSound}/>
      <div className="flex-1 flex flex-col items-center justify-center text-center px-10">
        <div className="inline-block bg-green-100 text-green-700 font-black text-base px-4 py-2 rounded-full mb-6">📝 오늘의 공부 약속</div>
        <h2 className="text-4xl font-black text-slate-800 mb-8 leading-snug">
          "꾸며주는 말을 넣어<br/>문장을 더 생생하게 만들어요!"
        </h2>
        <div className="card card-green p-8 max-w-lg mb-10 text-xl font-bold text-slate-500 leading-relaxed word-keep italic">
          모양이나 소리를 나타내는 말을 넣으면<br/>문장이 훨씬 재미있어져요! 함께 탐험해볼까요?
        </div>
        <button onClick={() => setPhase('level_select')}
          className="btn w-full max-w-xs py-5 bg-green-500 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-green-600">
          탐험 시작! ➡️
        </button>
      </div>
    </div>
  );

  /* ── 레벨 선택 ─────────────────────────────── */
  if (phase === 'level_select') return (
    <div className="w-full h-full flex flex-col bg-white">
      <Header label="📚 문제 수 선택" soundOn={soundOn} toggleSound={toggleSound}/>
      <div className="flex-1 flex flex-col items-center justify-center px-8 text-center">
        <h2 className="text-3xl font-black text-slate-800 mb-10">몇 개의 꾸며주는 말을 탐험할까요?</h2>
        <div className="flex flex-col gap-5 w-full max-w-xs">
          {[5,10,15].map((n,i) => (
            <button key={n} onClick={() => handleLevel(n)}
              className="btn py-6 bg-white border-4 border-green-100 hover:border-green-400 rounded-3xl text-3xl font-black text-green-600 shadow-md flex items-center justify-between px-8">
              <span>{n} 개 탐험</span>
              <span>{['🌱','🌿','🌳'][i]}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  /* ── 개념 학습 ─────────────────────────────── */
  if (phase === 'concept') {
    const w = conceptList[conceptIdx] || WORD_DB[0];
    return (
      <div className="w-full h-full flex flex-col" style={{background:'#f8fffb'}}>
        <Header label={`💡 꾸며주는 말 배우기 ${conceptIdx+1}/3`} soundOn={soundOn} toggleSound={toggleSound}/>
        <div className="flex-1 flex flex-col items-center justify-center px-6 py-2">
          <div className="card card-green w-full max-w-2xl p-10 flex flex-col items-center text-center">
            {/* 분류 태그 */}
            <span className={`text-2xl font-black px-6 py-3 rounded-2xl mb-6 ${w.cat==='모양' ? 'bg-green-100 text-green-700' : 'bg-teal-100 text-teal-700'}`}>
              {w.cat==='모양' ? '👀 모양을 꾸며주는 말' : '👂 소리를 꾸며주는 말'}
            </span>
            {/* 예시 문장 */}
            <div className="bg-green-50 border-2 border-green-100 rounded-2xl p-6 mb-6 w-full">
              <p className="text-2xl font-bold text-slate-700 italic">"{w.ex}"</p>
            </div>
            {/* 이모지 + 단어 */}
            <div className="text-[90px] mb-4 float">{w.emoji}</div>
            <h3 className="text-5xl font-black text-green-600 mb-3">"{w.id}"</h3>
            <p className="text-xl font-bold text-slate-400 word-keep max-w-md">{w.desc}</p>
          </div>
          <button onClick={() => { if (conceptIdx < 2) setConceptIdx(c => c+1); else { setQIdx(0); setPhase('activity'); } }}
            className="btn mt-6 w-full max-w-2xl py-6 rounded-2xl font-black text-2xl shadow-lg text-white"
            style={{backgroundColor:'#16a34a'}}>
            {conceptIdx < 2 ? '다음 설명 보기 ➡️' : '퀴즈 시작하기! 🎯'}
          </button>
        </div>
      </div>
    );
  }

  /* ── 퀴즈 ─────────────────────────────────── */
  if (phase === 'activity') {
    const list = reviewMode ? wrong : qs;
    const q = list[qIdx];
    if (!q) { setPhase('self_rating'); return null; }

    return (
      <div className="w-full h-full flex flex-col bg-white">
        <Header label={reviewMode ? '🔄 다시 풀기' : '🧩 꾸며주는 말 퀴즈'} soundOn={soundOn} toggleSound={toggleSound}/>
        <div className="flex-1 flex flex-col items-center justify-center px-6">
          <div className="card card-green w-full max-w-2xl p-10 text-center">
            {!fb ? (
              <>
                <div className="text-[90px] mb-4">{q.img}</div>
                {/* 빈칸 문장 */}
                <div className="bg-green-50 border-2 border-green-100 rounded-2xl p-6 mb-8">
                  <p className="text-3xl font-black text-slate-800 word-keep">
                    {q.before}&nbsp;
                    <span className="inline-block bg-white border-b-4 border-green-400 px-6 py-1 rounded-lg text-green-500 font-black">( ? )</span>
                    &nbsp;{q.after}
                  </p>
                </div>
                <div className="grid grid-cols-2 gap-5">
                  {q.opts.map((o,i) => (
                    <button key={i} onClick={() => checkAns(o)}
                      className="btn py-7 bg-slate-50 border-2 border-slate-100 hover:border-green-400 hover:bg-green-50 rounded-3xl text-3xl font-black text-slate-700">
                      {o}
                    </button>
                  ))}
                </div>
              </>
            ) : (
              <>
                <div className="text-[90px] mb-4">{fb.ok ? '🌟' : '🤔'}</div>
                <h2 className={`text-4xl font-black mb-5 ${fb.ok ? 'text-emerald-500' : 'text-amber-500'}`}>
                  {fb.ok ? '정답이에요!' : '다시 해볼까요?'}
                </h2>
                {fb.ok && (
                  <>
                    <div className="bg-emerald-50 border-2 border-emerald-100 rounded-2xl p-5 mb-4 text-xl font-bold text-slate-600 italic">{fb.msg}</div>
                    <div className="bg-green-100 rounded-xl py-2 px-4 mb-6 inline-block text-xl font-black text-green-800">📝 {fb.concept}</div>
                  </>
                )}
                <button onClick={fb.ok ? nextQ : () => setFb(null)}
                  className={`btn w-full py-5 rounded-2xl font-black text-2xl text-white shadow-lg ${fb.ok ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-amber-400 hover:bg-amber-500'}`}>
                  {fb.ok ? '다음 문제로 ▶' : '다시 선택하기'}
                </button>
              </>
            )}
          </div>
          <p className="mt-5 text-base font-black text-slate-300">{qIdx+1} / {list.length}</p>
        </div>
      </div>
    );
  }

  /* ── 재도전 안내 ─────────────────────────────── */
  if (phase === '재도전안내') return (
    <div className="w-full h-full flex flex-col">
      <Header label="💡 한 번 더!" soundOn={soundOn} toggleSound={toggleSound}/>
      <div className="flex-1 flex flex-col items-center justify-center text-center px-8">
        <div className="text-[100px] mb-6">💡</div>
        <h2 className="text-3xl font-black text-slate-800 mb-4">포기하지 않는 탐험가가<br/>제일 멋져요!</h2>
        <div className="card card-amber p-6 max-w-sm mb-10">
          <p className="text-xl font-bold text-slate-600 word-keep">
            아쉬운 문제를 마지막에 한 번 더 풀어야<br/>
            <span className="text-orange-500 font-black">틀린 문제를 풀고 저장</span>할 수 있어요!
          </p>
        </div>
        <button onClick={() => { setReviewMode(true); setQIdx(0); setFb(null); setPhase('activity'); }}
          className="btn py-5 px-12 bg-orange-500 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-orange-600">
          🔄 다시 도전!
        </button>
      </div>
    </div>
  );

  /* ── 별점 자기 평가 ─────────────────────────── */
  if (phase === 'self_rating') return (
    <div className="w-full h-full flex flex-col bg-white">
      <Header label="⭐ 나의 별점" soundOn={soundOn} toggleSound={toggleSound}/>
      <div className="flex-1 flex flex-col items-center justify-center px-8 text-center">
        <h2 className="text-4xl font-black text-slate-800 mb-4">오늘 꾸며주는 말 공부 어땠나요?</h2>
        <p className="text-xl font-bold text-slate-400 mb-10 italic">별표를 눌러 내 마음의 즐거움을 알려줘요!</p>
        <div className="flex gap-4 mb-12 justify-center">
          {[1,2,3,4,5].map(s => (
            <button key={s} onClick={() => setStars(s)}
              className={`text-7xl btn ${stars >= s ? 'scale-125 drop-shadow-lg' : 'opacity-25 grayscale'}`}>⭐</button>
          ))}
        </div>
        {stars > 0 && (
          <button onClick={() => setPhase('recording')}
            className="btn w-full max-w-xs py-5 bg-green-500 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-green-600">
            다음으로 ➡️
          </button>
        )}
      </div>
    </div>
  );

  /* ── 녹음 과제 (나만의 문장 만들기) ─────────────── */
  if (phase === 'recording') {
    const learnedWords = [...new Set(history.filter(h => h.ok).map(h => h.word))];
    return (
      <div className="w-full h-full flex flex-col" style={{background:'#f0fdf4'}}>
        <Header label="🎙️ 나만의 문장 만들기" soundOn={soundOn} toggleSound={toggleSound}/>
        <div className="flex-1 flex flex-col items-center justify-center px-6 text-center">
          <div className="card card-green w-full max-w-xl p-8 mb-5">
            <p className="text-3xl font-black text-green-600 mb-3">꾸며주는 말로 문장 만들기!</p>
            <p className="text-xl font-bold text-slate-500 mb-5">아래 단어 중 하나를 골라 문장을 만들어 말해봐요</p>

            {/* 단어 선택 버튼 */}
            <div className="flex flex-wrap gap-3 justify-center mb-6">
              {learnedWords.map(w => (
                <button key={w} onClick={() => setRecWord(w)}
                  className={`btn px-5 py-3 rounded-2xl font-black text-xl border-4 ${recWord===w ? 'bg-green-500 text-white border-green-500' : 'bg-white text-green-700 border-green-200'}`}>
                  {w}
                </button>
              ))}
            </div>

            {/* 예시 문장 */}
            {recWord && (
              <div className="bg-amber-50 border-2 border-amber-100 rounded-2xl p-5 mb-7">
                <p className="text-base font-black text-slate-400 mb-2">📝 예시 문장</p>
                <p className="text-xl font-bold text-amber-700">
                  "{(WORD_DB.find(w => w.id === recWord) || {}).ex || `나는 ${recWord} 말해봐요.`}"
                </p>
              </div>
            )}

            {recStep === 'idle' && (
              <button onClick={startRec}
                className="btn w-full py-6 bg-rose-500 text-white rounded-2xl font-black text-3xl shadow-lg animate-pulse hover:animate-none hover:bg-rose-600">
                🔴 녹음 시작!
              </button>
            )}
            {recStep === 'rec' && (
              <div className="flex flex-col gap-4">
                <p className="text-2xl font-black text-rose-500 animate-pulse">🔴 녹음 중... 말해보세요!</p>
                <button onClick={stopRec}
                  className="btn w-full py-6 bg-slate-800 text-white rounded-2xl font-black text-2xl shadow-lg">
                  ⏹ 다 말했어요! 완료
                </button>
              </div>
            )}
            {recStep === 'done' && (
              <div className="flex flex-col gap-4">
                <p className="text-2xl font-black text-emerald-600 mb-2">✅ 녹음 완료!</p>
                {audioUrl && <audio controls src={audioUrl} className="w-full rounded-xl"/>}
                <div className="flex gap-4 mt-2">
                  <button onClick={() => { setRecStep('idle'); setAudioUrl(null); setAudioB64(null); }}
                    className="btn flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-lg">
                    🔄 다시 하기
                  </button>
                  <button onClick={saveResult}
                    className="btn flex-[2] py-4 bg-green-600 text-white rounded-2xl font-black text-xl shadow-lg hover:bg-green-700">
                    제출하기 🏆
                  </button>
                </div>
              </div>
            )}
          </div>

          {recStep !== 'rec' && (
            <button onClick={() => setPhase('report')}
              className="btn text-slate-300 underline font-bold text-base">
              말하기가 쑥스러우면 넘어가도 돼요
            </button>
          )}
        </div>
      </div>
    );
  }

  /* ── 수료증 및 결과 화면 ─────────────────────── */
  if (phase === 'report') {
    const learned = [...new Set(history.filter(h => h.ok).map(h => h.word))];
    return (
      <div className="w-full h-full flex flex-col px-8 py-4 relative overflow-auto scroll-y"
           style={{background:'linear-gradient(145deg,#f0fdf4 0%,#ecfeff 100%)'}}>
        {saving && (
          <div className="absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-50 rounded-[2.5rem]">
            <div className="w-14 h-14 border-4 border-green-100 border-t-green-500 rounded-full animate-spin mb-4"/>
            <p className="text-xl font-black text-slate-700">기록 저장 중이에요...</p>
          </div>
        )}

        <div className="text-center mb-4">
          <div className="text-6xl mb-2">🏆</div>
          <h1 className="text-4xl font-black text-slate-900">수료증 발급!</h1>
        </div>

        {/* 가로 레이아웃 */}
        <div className="flex gap-6 flex-1 mb-5">
          {/* 왼쪽: 인증 */}
          <div className="card card-green flex-1 p-8 flex flex-col items-center justify-center text-center">
            <div className="text-6xl mb-4">📝</div>
            <h3 className="text-3xl font-black text-slate-800 mb-3">{student} 탐험가!</h3>
            <p className="text-xl font-bold text-slate-500 italic mb-4 leading-relaxed">
              꾸며주는 말을 넣어<br/>문장을 멋지게 만드는<br/>실력을 갖추었습니다.
            </p>
            <div className="flex gap-1 justify-center mb-4">
              {[1,2,3,4,5].map(s => <span key={s} className={`text-3xl ${s <= stars ? '' : 'opacity-20 grayscale'}`}>⭐</span>)}
            </div>
            <p className="text-sm font-mono text-slate-300">{new Date().toLocaleDateString('ko-KR')}</p>
          </div>

          {/* 오른쪽: 배운 단어 */}
          {learned.length > 0 && (
            <div className="card card-teal flex-1 p-8 flex flex-col">
              <p className="text-2xl font-black text-teal-600 mb-5 text-center">✨ 오늘 배운 꾸며주는 말</p>
              <div className="grid grid-cols-2 gap-3 flex-1 content-center">
                {learned.map((w,i) => {
                  const wd = WORD_DB.find(d => d.id === w) || {};
                  return (
                    <div key={i} className="bg-teal-50 border-2 border-teal-100 rounded-2xl px-4 py-3 flex items-center gap-2">
                      <span className="text-4xl">{wd.emoji || '✨'}</span>
                      <span className="text-2xl font-black text-slate-700">{w}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* 버튼 */}
        <div className="flex gap-4">
          <button onClick={() => downloadCert(student, learned)}
            className="btn flex-1 py-5 bg-green-600 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-green-700">
            🖼️ 수료증 저장
          </button>
          <button onClick={() => window.location.reload()}
            className="btn flex-1 py-5 bg-slate-800 text-white rounded-2xl font-black text-2xl shadow-lg hover:bg-slate-700">
            🏠 처음으로
          </button>
        </div>
      </div>
    );
  }

  return null;
};

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
