<script>
/* ── GAS 웹앱 URL ──────────────────────────── */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyKRf_2sipDDAIPlLzoMmxZpquaLgEtTEtzAVGSAUvEVMdWi-YlWDfJ2cZnS4SkcPumgQ/exec";

const gasGet = async (action) => {
  try {
    const r = await fetch(GAS_URL + '?action=' + action, { redirect:'follow' });
    return JSON.parse(await r.text());
  } catch(_){ return null; }
};
const gasPost = async (data) => {
  try {
    await fetch(GAS_URL, {
      method:'POST', mode:'no-cors',
      headers:{ 'Content-Type':'text/plain' },
      body: JSON.stringify(data)
    });
  } catch(_){}
};

/* ── 한국어 받침 판별 + 조사 자동 처리 ── */
function hasJongseong(str) {
  if (!str) return false;
  const ch = str[str.length - 1];
  const code = ch.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 !== 0;
}
const josa = {
  eunNeun: function(w){ return w + (hasJongseong(w) ? '은' : '는'); },
  iGa:     function(w){ return w + (hasJongseong(w) ? '이' : '가'); },
  eulReul: function(w){ return w + (hasJongseong(w) ? '을' : '를'); },
  iyeyo:   function(w){ return w + (hasJongseong(w) ? '이에요' : '예요'); },
};
// 시트 피드백 텍스트 자동 보정
function fixKoreanJosa(text) {
  if (!text) return text;
  let fixed = text;
  // 받침 없는 단어 + "이에요" → "예요"
  fixed = fixed.replace(/([가-힣])이에요/g, function(m, c){
    return hasJongseong(c) ? m : c + '예요';
  });
  // 받침 있는 단어 + "예요" → "이에요"
  fixed = fixed.replace(/([가-힣])예요/g, function(m, c){
    return hasJongseong(c) ? c + '이에요' : m;
  });
  return fixed;
}

/* ── 학생/단어/퀴즈 기본값 ───────────────── */
const SAMPLES = ['김민준','이하은','박서준','최지아','정수아','한지호'];

  { id:9, img:'🌬️', before:'바람이', after:'불어요.', opts:['반짝반짝','쌩쌩'], a:'쌩쌩', fb:'바람이 빠르게 지나가는 소리는 쌩쌩이에요.', concept:'소리를 꾸며주는 말' },
  { id:10, img:'🚲', before:'자전거가 언덕을', after:'내려갑니다.', opts:['쌩쌩','알록달록'], a:'쌩쌩', fb:'빠르게 달려갈 때도 쌩쌩이라고 표현해요.', concept:'소리를 꾸며주는 말' },
];

/* ── 자연스러운 한국어 TTS ──────────────── */
let cachedKoVoice = null;
function pickKoVoice() {
  if (cachedKoVoice) return cachedKoVoice;
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  if (!voices || !voices.length) return null;
  let v = voices.find(function(x){ return x.lang === 'ko-KR' && x.name && x.name.toLowerCase().indexOf('google') >= 0 && !x.localService; });
  if (!v) v = voices.find(function(x){ return x.lang === 'ko-KR' && x.name && /wavenet|neural|premium|enhanced|natural/i.test(x.name); });
  if (!v) v = voices.find(function(x){ return x.lang === 'ko-KR' && x.name && x.name.toLowerCase().indexOf('google') >= 0; });
  if (!v) v = voices.find(function(x){ return x.lang === 'ko-KR'; });
  cachedKoVoice = v || null;
  return cachedKoVoice;
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function(){ cachedKoVoice = null; pickKoVoice(); };
  setTimeout(pickKoVoice, 100);
}
function speak(text, on, onEnd) {
  if (!on || !window.speechSynthesis) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  setTimeout(function(){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.95; u.pitch = 1.0; u.volume = 1.0;
    const v = pickKoVoice(); if (v) u.voice = v;
    if (onEnd) u.onend = onEnd;
    window.speechSynthesis.speak(u);
  }, 50);
}

/* ── Web Audio 효과음 ───────────────────── */
let audioCtx = null;
function getAudioCtx(){
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
  }
  return audioCtx;
}
function playTone(freq, duration, type, volume){
  const ctx = getAudioCtx(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine'; osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration);
}
const sfx = {
  correct: function(on){ if(!on) return; playTone(523.25,0.12,'sine',0.3); setTimeout(function(){playTone(659.25,0.12,'sine',0.3);},100); setTimeout(function(){playTone(783.99,0.18,'sine',0.3);},200); },
  wrong:   function(on){ if(!on) return; playTone(220,0.18,'sawtooth',0.18); setTimeout(function(){playTone(180,0.22,'sawtooth',0.18);},150); },
  click:   function(on){ if(!on) return; playTone(800,0.05,'square',0.1); },

  record:  function(on){ if(!on) return; playTone(440,0.08,'sine',0.2); },
};

/* ── 수료증 PNG ─────────────────────────── */
function downloadCert(name, learned, stars, helpCount) {
  const cv = document.createElement('canvas');
  cv.width = 1200; cv.height = 1500;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#f0fdf4'; ctx.fillRect(0,0,1200,1500);
  ctx.strokeStyle = '#34d399'; ctx.lineWidth = 40; ctx.strokeRect(40,40,1120,1420);
  ctx.strokeStyle = '#bbf7d0'; ctx.lineWidth = 15; ctx.strokeRect(70,70,1060,1360);
  ctx.textAlign = 'center';
  ctx.font = 'bold 96px sans-serif'; ctx.fillStyle = '#059669';
  ctx.fillText('✨ 수 료 증 ✨', 600, 220);
  ctx.font = 'bold 52px sans-serif'; ctx.fillStyle = '#1e293b';
  ctx.fillText('꾸며주는 말 탐험대', 600, 330);
  ctx.font = '900 92px sans-serif'; ctx.fillStyle = '#059669';
  ctx.fillText(name + ' 탐험가', 600, 510);
  ctx.font = '50px sans-serif'; ctx.fillStyle = '#475569';
  ['위 탐험가는 꾸며주는 말을 사용하여','문장을 생생하게 만드는 실력을','갖추었기에 이 수료증을 수여합니다.']
    .forEach(function(l, i){ ctx.fillText(l, 600, 680 + i*90); });
  if (stars > 0) {
    ctx.font = '70px sans-serif';
    ctx.fillText('⭐'.repeat(stars) + '☆'.repeat(5-stars), 600, 950);
  }
  if (learned && learned.length > 0) {
    ctx.font = 'bold 48px sans-serif'; ctx.fillStyle = '#059669';
    ctx.fillText('🌿 오늘 배운 꾸며주는 말 🌿', 600, 1080);
    ctx.font = '44px sans-serif'; ctx.fillStyle = '#1e293b';
    ctx.fillText(learned.join('  |  '), 600, 1160);
  }
  ctx.font = '120px serif'; ctx.fillText('📝✨📝', 600, 1340);
  ctx.font = 'bold 40px sans-serif'; ctx.fillStyle = '#94a3b8';
  ctx.fillText(new Date().toLocaleDateString('ko-KR'), 600, 1440);
  const a = document.createElement('a');
  a.download = '수료증_' + name + '.png';
  a.href = cv.toDataURL('image/png');
  a.click();
}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

  return (
    <div className="reward-sticker">
      <div className="flex gap-3">
        {stickers.map(function(s, i){
          return <span key={i} className="sticker-burst inline-block"
            style={{ fontSize:'clamp(3rem,8vmin,5rem)', animationDelay:(i*0.08) + 's' }}>{s}</span>;
        })}
      </div>
    </div>
  );
}

function StarRating({ value, onChange, size }) {
  const sz = size === 'large' ? 'clamp(2.5rem,7vmin,4.5rem)' : 'clamp(2rem,5.5vmin,3.5rem)';
  return (
    <div className="flex gap-1 sm:gap-2 justify-center">
      {[1,2,3,4,5].map(function(s){
        return (
          <button key={s} onClick={function(){ onChange(s); }}
            className={"btn transition-all duration-200 " + (value >= s ? 'scale-110 drop-shadow-lg':'opacity-25 grayscale')}
            style={{ fontSize: sz }}>⭐</button>
        );
      })}
    </div>
  );
}

/* ───────────── 메인 앱 ───────────── */
function App() {
  const [phase, setPhase] = useState('loading');

  // 사용자
  const [students, setStudents] = useState([]);
  const [student, setStudent] = useState('');

  // 설정
  const [soundOn, setSoundOn] = useState(false);
  const [micReady, setMicReady] = useState(false);
  const permStreamRef = useRef(null);

  // 개념 학습
  const [conceptList, setConceptList] = useState([]);
  const [conceptIdx, setConceptIdx] = useState(0);
  const [conceptStep, setConceptStep] = useState('explain');

  // 개념 연습
  const [practiceItems, setPracticeItems] = useState([]);
  const [practiceShake, setPracticeShake] = useState(null);
  const [practiceFb, setPracticeFb] = useState(null);
  const [dragging, setDragging] = useState(null);

  // 퀴즈
  const [qs, setQs] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [fb, setFb] = useState(null);
  const [wrong, setWrong] = useState([]);
  const [history, setHistory] = useState([]);
  const [reviewMode, setReviewMode] = useState(false);
  const [helpUsedThisQ, setHelpUsedThisQ] = useState(false);
  const [totalHelp, setTotalHelp] = useState(0);

  // 녹음
  const [recSessions, setRecSessions] = useState([]);
  const [currentRecIdx, setCurrentRecIdx] = useState(0);
  const [recWord, setRecWord] = useState('');
  const [recStep, setRecStep] = useState('idle');
  const [audioUrl, setAudioUrl] = useState(null);
  const [audioB64, setAudioB64] = useState(null);
  const [sttText, setSttText] = useState('');
  const [interimText, setInterimText] = useState('');
  const [typedText, setTypedText] = useState('');
  const [inputMode, setInputMode] = useState('voice');
  const [recSelfStars, setRecSelfStars] = useState(0);

  // 보상
  const [showReward, setShowReward] = useState(false);
  const [rewardType, setRewardType] = useState('star');
  const [stickers, setStickers] = useState([]);

  // 최종 평가
  const [finalStars, setFinalStars] = useState(0);
  const [reflection, setReflection] = useState({ best:'', hard:'', next:'' });
  const [reflectionRecKey, setReflectionRecKey] = useState(null); // 어떤 항목 녹음 중인지
  const [reflectionInterim, setReflectionInterim] = useState('');

  // 저장
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  // refs
  const mrRef = useRef(null);
  const chunksRef = useRef([]);
  const recogRef = useRef(null);
  const reflRecogRef = useRef(null);

  /* ── 초기 로드 ─────────────────── */
  useEffect(function(){
    async function init() {
      let names = SAMPLES.slice();
      if (GAS_URL) {
        try {
          const rs = await gasGet('getStudentList');
          if (Array.isArray(rs) && rs.length > 0) names = rs;
          const rw = await gasGet('getWordData');
          if (Array.isArray(rw) && rw.length > 0) WORD_DB = rw;
          const rq = await gasGet('getQuizData');
          if (Array.isArray(rq) && rq.length > 0) QUIZ_Q = rq;
        } catch(_){}
      }
      setStudents(names);
      setStudent(names[0]);
      setPhase('start');
    }
    init();
  }, []);

  /* ── 마이크 권한 ─────────────────── */
  async function requestMic() {
    try {
      if (navigator.permissions) {
        try {
          const p = await navigator.permissions.query({ name: 'microphone' });
          if (p.state === 'granted') {
            const s = await navigator.mediaDevices.getUserMedia({ audio:true });
            permStreamRef.current = s;
            setMicReady(true);
            return;
          }
        } catch(_){}
      }
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      permStreamRef.current = stream;
      setMicReady(true);
    } catch(_){
      alert('마이크 권한이 없어요. 브라우저 설정에서 허용해 주세요.');
    }
  }

  /* ── 녹음 위치 (5문제마다) ──────── */
  const recordPositions = useMemo(function(){
    const total = qs.length;
    const positions = [];
    for (let i = 5; i <= total; i += 5) positions.push(i);
    if (total > 0 && total < 5) positions.push(total);
    return positions;
  }, [qs.length]);
  const recordCount = recordPositions.length;
  const isRecordTime = !reviewMode && recordPositions.indexOf(qIdx + 1) >= 0;

  /* ── TTS 안내 ─────────────────── */
  useEffect(function(){
    if (!soundOn) return;
    if (phase === 'intro') speak('오늘은 꾸며주는 말로 문장을 더 생생하게 만들어볼 거예요!', true);
    else if (phase === 'concept' && conceptStep === 'explain') {
      const w = conceptList[conceptIdx];
      if (w) speak(w.ex + ' 이럴 때 쓰는 꾸며주는 말은 ' + w.id + '. ' + w.desc, true);
    }
    else if (phase === 'concept' && conceptStep === 'practice') {
      speak('이제 단어들을 모양과 소리로 분류해볼까요? 끌어다 놓아요.', true);
    }
    else if (phase === 'activity') {
      const list = reviewMode ? wrong : qs;
      const q = list[qIdx];
      if (q) speak(q.before + ', 빈칸, ' + q.after + '. 알맞은 꾸며주는 말을 골라보세요.', true);
    }
    else if (phase === 'recording') speak('꾸며주는 말을 넣어 멋진 문장을 만들어볼까요?', true);
    else if (phase === 'reflection') speak('오늘 배운 것을 정리해볼까요?', true);
    else if (phase === 'self_rating') speak('나의 다짐을 별표로 평가해봐요!', true);
    else if (phase === 'report') speak('수료증이 나왔어요! 정말 잘했어요!', true);
  }, [phase, conceptIdx, qIdx, conceptStep, soundOn]);

  /* ── 레벨 선택 ─────────────────── */
  function handleLevel(count) {
    const shuffled = QUIZ_Q.slice().sort(function(){ return Math.random() - 0.5; })
      .slice(0, Math.min(count, QUIZ_Q.length))
      .map(function(q){
        return Object.assign({}, q, { opts: q.opts.slice().sort(function(){ return Math.random() - 0.5; }) });
      });
    setQs(shuffled);
    const picked = WORD_DB.slice().sort(function(){ return Math.random() - 0.5; }).slice(0, 4);
    setConceptList(picked);
    setQIdx(0); setFb(null); setWrong([]); setHistory([]);
    setReviewMode(false); setFinalStars(0);
    setRecSessions([]); setCurrentRecIdx(0);
    setHelpUsedThisQ(false); setTotalHelp(0);
    setStickers([]);
    setReflection({ best:'', hard:'', next:'' });
    setSaved(false);
    setPhase('concept'); setConceptIdx(0); setConceptStep('explain');
    sfx.click(soundOn);
  }

  /* ── 개념 연습 시작 ─────────────── */
  function startConceptPractice() {
    const shapes = WORD_DB.filter(function(w){ return w.cat === '모양'; }).sort(function(){ return Math.random() - 0.5; }).slice(0, 2);
    const sounds = WORD_DB.filter(function(w){ return w.cat === '소리'; }).sort(function(){ return Math.random() - 0.5; }).slice(0, 2);
    const mixed = shapes.concat(sounds)
      .sort(function(){ return Math.random() - 0.5; })
      .map(function(w){ return { word: w.id, emoji: w.emoji, correctCat: w.cat, placed: null }; });
    setPracticeItems(mixed);
    setPracticeFb(null);
    setConceptStep('practice');
  }

  /* ── 드래그 핸들러 ─────────────── */
  function handleDragStart(idx) { setDragging(idx); sfx.click(soundOn); }
  function handleDrop(cat) {
    if (dragging === null) return;
    const item = practiceItems[dragging];
    if (!item) { setDragging(null); return; }
    const correct = item.correctCat === cat;
    const draggedIdx = dragging;

    setPracticeItems(function(prev){
      return prev.map(function(it, i){
        return i === draggedIdx ? Object.assign({}, it, { placed: cat, correct: correct }) : it;
      });
    });

    if (correct) {
      sfx.correct(soundOn);
      const wordWithJosa = josa.eunNeun(item.word);
      setPracticeFb({
        ok: true,
        word: item.word,
        emoji: item.emoji,
        cat: cat,
        msg: wordWithJosa + ' ' + cat + '을 꾸며주는 말이 맞아요!'
      });
      if (soundOn) speak('정답이에요! ' + wordWithJosa + ' ' + cat + '을 꾸며주는 말이에요.', true);
      setTimeout(function(){ setPracticeFb(null); }, 1800);
    } else {
      sfx.wrong(soundOn);
      setPracticeShake(draggedIdx);
      const wordWithJosa = josa.eunNeun(item.word);
      setPracticeFb({
        ok: false,
        word: item.word,
        emoji: item.emoji,
        wrongCat: cat,
        correctCat: item.correctCat,
        msg: wordWithJosa + ' ' + item.correctCat + '을 꾸며주는 말이에요!'
      });
      if (soundOn) speak('아쉬워요! ' + wordWithJosa + ' ' + item.correctCat + '을 꾸며주는 말이에요. 다시 해볼까요?', true);
      setTimeout(function(){ setPracticeShake(null); }, 500);
      setTimeout(function(){
        setPracticeItems(function(prev){
          return prev.map(function(it, i){
            return i === draggedIdx ? Object.assign({}, it, { placed: null, correct: undefined }) : it;
          });
        });
        setPracticeFb(null);
      }, 2200);
    }
    setDragging(null);
  }

  // 모바일 터치 드래그
  function handleTouchStart(idx) { setDragging(idx); sfx.click(soundOn); }
  function handleTouchEnd(e) {
    if (dragging === null) return;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el) {
      const zone = el.closest('[data-dropzone]');
      if (zone) {
        handleDrop(zone.dataset.dropzone);
        return;
      }
    }
    setDragging(null);
  }

  const allPracticePlaced = practiceItems.length > 0 && practiceItems.every(function(p){ return p.placed; });

  /* ── 퀴즈 답 체크 ─────────────────────── */
  function checkAns(ua) {
    const list = reviewMode ? wrong : qs;
    const q = list[qIdx];
    if (!q) return;
    const ok = ua === q.a;
    if (!reviewMode) {
      setHistory(function(h){ return h.concat([{
        id:q.id, ok:ok, word:q.a, concept:q.concept, userAns:ua, helpUsed:helpUsedThisQ
      }]); });
    }
    if (ok) {
      setFb({ ok:true, msg: fixKoreanJosa(q.fb), concept:q.concept });
      if (reviewMode) setWrong(function(w){ return w.filter(function(x){ return x.id !== q.id; }); });
      sfx.correct(soundOn);
      if (window.confetti) confetti({ particleCount:90, spread:60, origin:{ y:.65 } });
      if (soundOn) speak(fixKoreanJosa(q.fb), true);
    } else {
      const wordWithJosa = josa.eunNeun(q.a);
      setFb({ ok:false, hint:'힌트: "' + q.a + '"' + wordWithJosa.slice(q.a.length) + ' ' + q.concept + '이에요.' });
      if (!wrong.find(function(x){ return x.id === q.id; })) setWrong(function(w){ return w.concat([q]); });
      sfx.wrong(soundOn);
      if (soundOn) speak('아쉬워요, 다시 생각해볼까요?', true);
    }
  }

  /* ── 도움받기 ──────────────────────── */
  function useHelp() {
    const list = reviewMode ? wrong : qs;
    const q = list[qIdx];
    if (!q) return;
    setHelpUsedThisQ(true);
    setTotalHelp(function(t){ return t + 1; });
    sfx.click(soundOn);
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(q.before + ' 빈칸 ' + q.after);
      u.lang = 'ko-KR'; u.rate = 0.9; u.pitch = 1.0;
      const v = pickKoVoice(); if (v) u.voice = v;
      const wordData = WORD_DB.find(function(w){ return w.id === q.a; });
      if (wordData && wordData.ex) {
        u.onend = function(){
          const u2 = new SpeechSynthesisUtterance('예를 들면, ' + wordData.ex);
          u2.lang = 'ko-KR'; u2.rate = 0.9; u2.pitch = 1.0;
          if (v) u2.voice = v;
          window.speechSynthesis.speak(u2);
        };
      }
      window.speechSynthesis.speak(u);
    }
  }

  /* ── 다음 문제 ──────────────────── */
  function nextQ() {
    setFb(null);
    setHelpUsedThisQ(false);
    const list = reviewMode ? wrong : qs;

    // 녹음 타이밍 체크
    if (!reviewMode && recordPositions.indexOf(qIdx + 1) >= 0) {
      const newQIdx = qIdx + 1;
      setCurrentRecIdx(recordPositions.indexOf(qIdx + 1));
      // 마지막 문제였다면 녹음 후 reflection
      if (newQIdx >= qs.length) {
        // 인덱스는 그대로 두고 녹음으로
      } else {
        setQIdx(newQIdx);
      }
      goToRecording();
      return;
    }

    if (qIdx < list.length - 1) {
      setQIdx(function(q){ return q + 1; });
    } else {
      if (reviewMode || wrong.length === 0) {
        setPhase('reflection');
      } else {
        setPhase('재도전안내');
      }
    }
  }

  /* ── 녹음 화면으로 ─────────────────── */
  function goToRecording() {
    const learned = Array.from(new Set(history.filter(function(h){ return h.ok; }).map(function(h){ return h.word; })));
    const choices = learned.length >= 3 ? learned : learned.concat(WORD_DB.slice(0,4).map(function(w){ return w.id; }));
    setRecWord(choices[0] || WORD_DB[0].id);
    setRecStep('idle');
    setAudioUrl(null); setAudioB64(null);
    setSttText(''); setInterimText(''); setTypedText('');
    setInputMode('voice');
    setRecSelfStars(0);
    setPhase('recording');
  }

  /* ── 녹음 시작 ──────────────────── */
  async function startRec() {
    sfx.record(soundOn);
    setSttText(''); setInterimText('');
    try {
      let stream = permStreamRef.current;
      if (!stream || stream.getAudioTracks().every(function(t){ return t.readyState === 'ended'; })) {
        stream = await navigator.mediaDevices.getUserMedia({ audio:true });
        permStreamRef.current = stream;
      }
      const mr = new MediaRecorder(stream);
      mrRef.current = mr; chunksRef.current = [];
      mr.ondataavailable = function(e){ if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = function(){
        const blob = new Blob(chunksRef.current, { type:'audio/webm' });
        setAudioUrl(URL.createObjectURL(blob));
        const fr = new FileReader();
        fr.readAsDataURL(blob);
        fr.onloadend = function(){ setAudioB64(fr.result.split(',')[1]); setRecStep('done'); };
      };
      mr.start();
      setRecStep('rec');

      const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecog) {
        const rec = new SpeechRecog();
        rec.lang = 'ko-KR';
        rec.continuous = true;
        rec.interimResults = true;
        rec.onresult = function(ev){
          let final = '', interim = '';
          for (let i = ev.resultIndex; i < ev.results.length; i++) {
            const t = ev.results[i][0].transcript;
            if (ev.results[i].isFinal) final += t;
            else interim += t;
          }
          if (final) setSttText(function(prev){ return (prev + ' ' + final).trim(); });
          setInterimText(interim);
        };
        rec.onerror = function(e){ console.log('STT 오류:', e.error); };
        recogRef.current = rec;
        try { rec.start(); } catch(_){}
      }
    } catch(_){
      alert('마이크를 사용할 수 없어요!');
    }
  }

  function stopRec() {
    if (mrRef.current && mrRef.current.state !== 'inactive') mrRef.current.stop();
    if (recogRef.current) {
      try { recogRef.current.stop(); } catch(_){}
      recogRef.current = null;
    }
    setInterimText('');
  }

  /* ── 완성 문장 듣기 ─────────────── */
  function playFinalSentence() {
    const text = inputMode === 'voice' ? sttText : typedText;
    if (!text || !text.trim()) return;
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR'; u.rate = 0.95; u.pitch = 1.0;
    const v = pickKoVoice(); if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }

  /* ── 녹음 자기평가 후 처리 ────────── */
  function submitRecSelfEval() {
    const text = inputMode === 'voice' ? sttText : typedText;
    const session = {
      idx: currentRecIdx,
      word: recWord,
      sttText: text,
      audioB64: audioB64,
      stars: recSelfStars,
      mode: inputMode
    };
    setRecSessions(function(prev){ return prev.concat([session]); });

    const isLastRec = currentRecIdx >= recordCount - 1;
    const isLastQuiz = qIdx >= qs.length - 1;

    if (isLastRec || isLastQuiz) {
      setPhase('reflection');
    } else {
      setPhase('activity');
    }
  }

  function retryRec() {
    setRecStep('idle');
    setAudioUrl(null); setAudioB64(null);
    setSttText(''); setInterimText(''); setTypedText('');
    setRecSelfStars(0);
  }

  /* ── 성찰 음성 입력 ──────────────── */
  function startReflectionRec(key) {
    const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecog) {
      alert('이 브라우저는 음성 입력을 지원하지 않아요. 키보드로 입력해주세요!');
      return;
    }
    if (reflRecogRef.current) {
      try { reflRecogRef.current.stop(); } catch(_){}
      reflRecogRef.current = null;
    }
    setReflectionRecKey(key);
    setReflectionInterim('');

    const rec = new SpeechRecog();
    rec.lang = 'ko-KR';
    rec.continuous = true;
    rec.interimResults = true;
    rec.onresult = function(ev){
      let final = '', interim = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) final += t;
        else interim += t;
      }
      if (final) {
        setReflection(function(r){
          const newVal = ((r[key] || '') + ' ' + final).trim();
          return Object.assign({}, r, { [key]: newVal });
        });
      }
      setReflectionInterim(interim);
    };
    rec.onerror = function(){};
    rec.onend = function(){
      setReflectionRecKey(null);
      setReflectionInterim('');
    };
    reflRecogRef.current = rec;
    try { rec.start(); sfx.record(soundOn); } catch(_){}
  }

  function stopReflectionRec() {
    if (reflRecogRef.current) {
      try { reflRecogRef.current.stop(); } catch(_){}
      reflRecogRef.current = null;
    }
    setReflectionRecKey(null);
    setReflectionInterim('');
  }

  /* ── 보상 ──────────────────────── */
  function awardSticker(type) {
    setStickers(function(prev){ return prev.concat([type || 'star']); });
    setRewardType(type || 'star');
    setShowReward(true);
    sfx.reward(soundOn);
    if (window.confetti) confetti({ particleCount:60, spread:50, origin:{ y:.6 } });
  }

  /* ── 결과 저장 ──────────────────── */
  async function saveResult() {
    if (saved) { setPhase('report'); return; }
    setSaving(true); setSaved(true);
    const learned = Array.from(new Set(history.filter(function(h){ return h.ok; }).map(function(h){ return h.word; })));
    const correctCount = history.filter(function(h){ return h.ok; }).length;

    const payload = {
      name: student,
      total: qs.length,
      correct: correctCount,
      words: learned,
      rating: finalStars,
      helpCount: totalHelp,
      stickers: stickers.length,
      reflection: reflection,
      recordings: recSessions.map(function(r){
        return { word:r.word, text:r.sttText, stars:r.stars, mode:r.mode, audioBase64:r.audioB64 };
      }),
      audioBase64: recSessions[0] ? recSessions[0].audioB64 : null
    };

    if (GAS_URL) await gasPost(payload);
    setSaving(false);
    setPhase('report');
  }

  function toggleSound() {
    setSoundOn(function(s){
      const newVal = !s;
      if (newVal) {
        const ctx = getAudioCtx();
        if (ctx && ctx.state === 'suspended') ctx.resume();
        setTimeout(function(){ sfx.click(true); }, 50);
      } else {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
      }
      return newVal;
    });
  }

  function goHome() {
    if (confirm('정말 처음으로 돌아갈까요? 지금까지 한 것이 사라져요.')) {
      window.location.reload();
    }
  }

  /* ════════════ 화면 렌더링 ════════════ */

  /* 로딩 */
  if (phase === 'loading') {
    return (
      <div className="w-full h-full flex flex-col items-center justify-center gap-4 p-4">
        <div className="w-20 h-20 border-4 border-green-100 border-t-green-500 rounded-full animate-spin" />
        <p className="txt-xl font-bold text-slate-400">잠깐만요, 준비 중이에요~</p>
      </div>
    );
  }

  /* 시작 */
  if (phase === 'start') {
    return (
      <div className="w-full h-full flex flex-col items-center justify-center p-3 sm:p-5 relative overflow-hidden"
        style={{ background:'linear-gradient(145deg,#f0fdf4 0%,#ecfeff 100%)' }}>
        <div className="absolute top-4 left-4 opacity-10 float emoji-xl">🖊️</div>
        <div className="absolute bottom-8 right-4 opacity-10 float emoji-xl" style={{ animationDelay:'.8s' }}>🌿</div>

        <div className="float shrink-0"><Mascot size={90}/></div>
        <h1 className="txt-hero font-bold text-slate-900 text-center shrink-0 word-keep">
          꾸며주는 말 <span className="text-green-500">탐험대</span> ✨
        </h1>
        <p className="txt-md font-bold text-slate-500 mb-3 sm:mb-4 shrink-0">문장을 더 생생하게 만들어봐요!</p>

        <div className="card card-green w-full max-w-sm p-4 sm:p-6 shadow-xl shrink-0">
          <p className="text-center font-bold text-green-500 mb-2 txt-md">📝 내 이름을 골라요</p>
          <select value={student} onChange={function(e){ setStudent(e.target.value); }}
            className="w-full p-3 mb-3 bg-slate-50 border-2 border-slate-100 rounded-2xl txt-2xl font-bold text-slate-800 text-center focus:outline-none focus:border-green-400">
            {students.map(function(s){ return <option key={s} value={s}>{s}</option>; })}
          </select>

          {!micReady ? (
            <button onClick={requestMic}
              className="btn w-full py-3 mb-2 bg-green-50 text-green-700 border-2 border-green-200 rounded-2xl font-bold txt-md">
              🎙️ 마이크 준비하기
            </button>
          ) : (
            <p className="text-center text-emerald-600 font-bold txt-md mb-2">✅ 마이크 준비 완료!</p>
          )}

          <button onClick={function(){ sfx.click(soundOn); setPhase('intro'); }}
            className="btn w-full py-3 sm:py-4 bg-green-500 text-white rounded-2xl font-bold txt-3xl shadow-lg hover:bg-green-600">
            시작하기 ▶
          </button>
        </div>

        <div className="flex items-center gap-2 mt-3 shrink-0">
          <button onClick={toggleSound}
            className={"btn w-12 h-12 sm:w-14 sm:h-14 rounded-2xl border-2 shadow-sm txt-2xl " + (soundOn ? 'bg-green-100 text-green-600 border-green-200':'bg-white text-slate-300 border-slate-100')}>
            {soundOn ? '🔊' : '🔇'}
          </button>
          <p className="text-slate-500 txt-md font-bold">스피커: {soundOn ? '켜짐' : '꺼짐'}</p>
        </div>
      </div>
    );
  }

  /* 인트로 */
  if (phase === 'intro') {
    return (
      <div className="w-full h-full flex flex-col" style={{ background:'#f0fdf4' }}>
        <Header label="🌿 공부 약속" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col items-center justify-center text-center px-4 py-3 min-h-0 overflow-hidden">
          <div className="inline-block bg-green-100 text-green-700 font-bold px-4 py-2 rounded-full mb-3 txt-md shrink-0">
            📝 오늘의 공부 약속
          </div>
          <h2 className="txt-3xl font-bold text-slate-800 mb-3 sm:mb-4 leading-tight word-keep shrink-0">
            꾸며주는 말을 넣어<br/>
            <span className="text-green-500">문장을 더 생생하게!</span>
          </h2>
          <div className="card card-green p-3 sm:p-4 max-w-xl mx-auto mb-4 txt-md font-bold text-slate-500 word-keep shrink-0">
            모양이나 소리를 나타내는 말을 넣으면<br/>
            문장이 훨씬 재미있어져요! 🎒
          </div>
          <button onClick={function(){ sfx.click(soundOn); setPhase('level_select'); }}
            className="btn w-full max-w-sm py-3 sm:py-4 bg-green-500 text-white rounded-2xl font-bold txt-2xl shadow-lg hover:bg-green-600 shrink-0">
            탐험 시작! ➡️
          </button>
        </div>
      </div>
    );
  }

  /* 레벨 선택 */
  if (phase === 'level_select') {
    const levels = [[3,'🌱','짧게','문제 3개 + 녹음 1번'],
                    [5,'🌿','보통','문제 5개 + 녹음 1번'],
                    [10,'🌳','도전','문제 10개 + 녹음 2번']];
    return (
      <div className="w-full h-full flex flex-col bg-white">
        <Header label="📚 탐험 수 선택" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col items-center justify-center px-4 py-3 text-center min-h-0 overflow-hidden">
          <h2 className="txt-2xl font-bold text-slate-800 mb-2 word-keep shrink-0">몇 개를 탐험할까요?</h2>
          <p className="txt-md font-bold text-slate-500 mb-4 sm:mb-6 shrink-0">난이도를 골라요!</p>
          <div className="flex flex-col gap-3 w-full max-w-md shrink-0">
            {levels.map(function(item){
              const n = item[0], icon = item[1], title = item[2], sub = item[3];
              return (
                <button key={n} onClick={function(){ handleLevel(n); }}
                  className="btn py-3 sm:py-4 bg-white border-4 border-green-100 hover:border-green-400 hover:bg-green-50 rounded-3xl font-bold text-green-600 shadow-md flex items-center justify-between px-4 sm:px-6 gap-2 sm:gap-3">
                  <span className="emoji-md">{icon}</span>
                  <div className="flex-1 text-left">
                    <div className="txt-2xl font-bold">{n}개 탐험</div>
                    <div className="txt-md text-slate-500 font-bold">{sub}</div>
                  </div>
                  <span className="txt-md text-slate-500 font-bold">{title}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  /* 개념 학습 - 설명 */
  if (phase === 'concept' && conceptStep === 'explain') {
    const w = conceptList[conceptIdx] || WORD_DB[0];
    const totalConcept = conceptList.length;
    return (
      <div className="w-full h-full flex flex-col" style={{ background:'#f8fffb' }}>
        <Header label="💡 꾸며주는 말 배우기" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}
          progress={{ current: conceptIdx+1, total: totalConcept }}/>
        <div className="flex-1 flex flex-col px-3 sm:px-4 py-2 min-h-0 overflow-hidden">
          <div className="card card-green w-full max-w-2xl mx-auto p-3 sm:p-5 flex flex-col items-center text-center flex-1 min-h-0 justify-center">
            <span className={"txt-md font-bold px-3 py-1.5 rounded-2xl mb-2 shrink-0 " + (w.cat === '모양' ? 'bg-green-100 text-green-700':'bg-teal-100 text-teal-700')}>
              {w.cat === '모양' ? '👀 모양을 꾸며주는 말' : '👂 소리를 꾸며주는 말'}
            </span>
            <div className="bg-green-50 border-2 border-green-100 rounded-2xl p-2 sm:p-3 mb-2 w-full shrink-0">
              <p className="txt-xl font-bold text-slate-700 italic word-keep text-center">"{w.ex}"</p>
            </div>
            <div className="emoji-xl shrink-0 float">{w.emoji}</div>
            <h3 className="txt-hero font-bold text-green-600 my-1 shrink-0">"{w.id}"</h3>
            <p className="txt-md font-bold text-slate-500 word-keep shrink-0">{w.desc}</p>
          </div>
          <button onClick={function(){
            sfx.click(soundOn);
            if (conceptIdx < totalConcept - 1) setConceptIdx(function(c){ return c + 1; });
            else startConceptPractice();
          }}
            className="btn mt-2 shrink-0 w-full max-w-2xl mx-auto py-3 rounded-2xl font-bold txt-2xl shadow-lg text-white bg-green-600 hover:bg-green-700">
            {conceptIdx < totalConcept - 1 ? '다음 설명 보기 ➡️' : '연습해보기! 🎯'}
          </button>
        </div>
      </div>
    );
  }

  /* 개념 연습 - 드래그 분류 */
  if (phase === 'concept' && conceptStep === 'practice') {
    const placedShape = practiceItems.filter(function(it){ return it.placed === '모양' && it.correct; });
    const placedSound = practiceItems.filter(function(it){ return it.placed === '소리' && it.correct; });

    return (
      <div className="w-full h-full flex flex-col" style={{ background:'#f8fffb' }}>
        <Header label="🎯 분류 연습" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col px-3 sm:px-4 py-2 min-h-0 overflow-hidden relative">

          {/* 큰 피드백 오버레이 */}
          {practiceFb && (
            <div className="absolute inset-0 z-30 flex items-center justify-center pointer-events-none px-4">
              <div className={"pop-in card border-4 p-4 sm:p-6 max-w-md w-full text-center " + (practiceFb.ok ? 'bg-emerald-50 border-emerald-400' : 'bg-rose-50 border-rose-400')}
                style={{ boxShadow: '0 20px 50px rgba(0,0,0,0.2)' }}>
                <div className="emoji-lg mb-2">{practiceFb.ok ? '🎉' : '🤔'}</div>
                <p className={"txt-3xl font-bold mb-2 " + (practiceFb.ok ? 'text-emerald-600':'text-rose-600')}>
                  {practiceFb.ok ? '정답이에요!' : '아쉬워요!'}
                </p>
                <p className="txt-xl font-bold text-slate-700 word-keep">{practiceFb.msg}</p>
                {!practiceFb.ok && (
                  <p className="txt-md font-bold text-amber-600 mt-2">💡 다시 해볼까요?</p>
                )}
              </div>
            </div>
          )}

          <p className="text-center txt-xl font-bold text-slate-700 mb-1 shrink-0 word-keep">
            👇 단어를 알맞은 곳으로 끌어다 놓아요!
          </p>
          <p className="text-center txt-md font-bold text-amber-600 mb-2 shrink-0">
            💡 틀려도 괜찮아요. 다시 시도할 수 있어요!
          </p>

          {/* 단어 카드 */}
          <div className="flex flex-wrap gap-2 justify-center mb-2 shrink-0 px-1">
            {practiceItems.map(function(it, i){
              if (it.placed) return null;
              return (
                <div key={i}
                  draggable
                  onDragStart={function(){ handleDragStart(i); }}
                  onTouchStart={function(){ handleTouchStart(i); }}
                  onTouchEnd={handleTouchEnd}
                  className={"drag-item card card-amber px-3 py-2 " + (practiceShake === i ? 'shake':'')}
                  style={{ background:'#fffbeb' }}>
                  <div className="emoji-md text-center">{it.emoji}</div>
                  <div className="txt-xl font-bold text-amber-700 text-center">{it.word}</div>
                </div>
              );
            })}
            {practiceItems.length > 0 && practiceItems.every(function(p){ return p.placed; }) && (
              <div className="txt-2xl font-bold text-emerald-600 py-3">✨ 모두 분류 완료!</div>
            )}
          </div>

          {/* 드롭 영역 */}
          <div className="grid grid-cols-2 gap-2 sm:gap-3 flex-1 min-h-0">
            {/* 모양 */}
            <div data-dropzone="모양"
              onDragOver={function(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
              onDragLeave={function(e){ e.currentTarget.classList.remove('drag-over'); }}
              onDrop={function(e){ e.preventDefault(); e.currentTarget.classList.remove('drag-over'); handleDrop('모양'); }}
              className="card card-green flex flex-col items-center p-2 sm:p-3 overflow-hidden">
              <div className="txt-2xl font-bold text-green-700 shrink-0">👀 모양</div>
              <div className="txt-md font-bold text-green-600 mb-1 shrink-0">눈으로 보는 모습</div>
              <div className="flex flex-wrap gap-1 sm:gap-2 justify-center w-full content-start flex-1 overflow-hidden">
                {placedShape.map(function(it, i){
                  return (
                    <div key={i} className="bg-white px-2 py-1 rounded-xl border-2 border-emerald-200 pop-in">
                      <span className="txt-md font-bold text-emerald-700">{it.emoji} {it.word}</span>
                    </div>
                  );
                })}
                {placedShape.length === 0 && <p className="text-slate-300 txt-md font-bold self-center">여기로 끌어요</p>}
              </div>
            </div>
            {/* 소리 */}
            <div data-dropzone="소리"
              onDragOver={function(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
              onDragLeave={function(e){ e.currentTarget.classList.remove('drag-over'); }}
              onDrop={function(e){ e.preventDefault(); e.currentTarget.classList.remove('drag-over'); handleDrop('소리'); }}
              className="card card-teal flex flex-col items-center p-2 sm:p-3 overflow-hidden">
              <div className="txt-2xl font-bold text-teal-700 shrink-0">👂 소리</div>
              <div className="txt-md font-bold text-teal-600 mb-1 shrink-0">귀로 듣는 소리</div>
              <div className="flex flex-wrap gap-1 sm:gap-2 justify-center w-full content-start flex-1 overflow-hidden">
                {placedSound.map(function(it, i){
                  return (
                    <div key={i} className="bg-white px-2 py-1 rounded-xl border-2 border-emerald-200 pop-in">
                      <span className="txt-md font-bold text-emerald-700">{it.emoji} {it.word}</span>
                    </div>
                  );
                })}
                {placedSound.length === 0 && <p className="text-slate-300 txt-md font-bold self-center">여기로 끌어요</p>}
              </div>
            </div>
          </div>

          <button onClick={function(){ sfx.click(soundOn); setQIdx(0); setPhase('activity'); }}
            disabled={!allPracticePlaced}
            className="btn mt-2 shrink-0 w-full py-3 rounded-2xl font-bold txt-2xl shadow-lg text-white bg-green-600 hover:bg-green-700 disabled:bg-slate-300">
            {allPracticePlaced ? '퀴즈 시작하기! 🎯' : (practiceItems.filter(function(p){return p.placed;}).length + '/' + practiceItems.length + ' 분류 완료')}
          </button>
        </div>
      </div>
    );
  }

  /* 퀴즈 */
  if (phase === 'activity') {
    const list = reviewMode ? wrong : qs;
    const q = list[qIdx];
    if (!q) {
      setTimeout(function(){ setPhase('reflection'); }, 0);
      return null;
    }

    return (
      <div className="w-full h-full flex flex-col bg-white">
        <Header label={reviewMode ? '🔄 다시 풀기' : '🧩 꾸며주는 말 퀴즈'} soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}
          progress={{ current: qIdx+1, total: list.length }}/>
        <div className="flex-1 flex flex-col px-2 sm:px-4 py-2 min-h-0 overflow-hidden">
          <div className="card card-green w-full max-w-3xl mx-auto p-3 sm:p-5 text-center flex flex-col flex-1 min-h-0 justify-center">
            {!fb ? (
              <div className="flex flex-col h-full justify-center">
                <div className="flex-1 flex flex-col justify-center min-h-0">
                  <div className="emoji-xl mb-2 shrink-0">{q.img}</div>
                  <div className="bg-green-50 border-2 border-green-100 rounded-2xl p-3 sm:p-4 mb-3 sm:mb-4 shrink-0">
                    <p className="txt-2xl font-bold text-slate-800 word-keep leading-relaxed text-center">
                      {q.before}&nbsp;
                      <span className="inline-block bg-white border-b-4 border-green-400 px-3 sm:px-5 py-1 mx-1 rounded-xl text-green-500 font-bold">( ? )</span>
                      &nbsp;{q.after}
                    </p>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2 sm:gap-4 shrink-0 mb-2">
                  {q.opts.map(function(o, i){
                    return (
                      <button key={i} onClick={function(){ checkAns(o); }}
                        className="btn py-3 sm:py-5 bg-slate-50 hover:bg-green-50 rounded-3xl txt-2xl font-bold text-slate-700"
                        style={{ border:'3px solid #f1f5f9' }}>
                        {o}
                      </button>
                    );
                  })}
                </div>
                <p className="text-amber-600 txt-md font-bold shrink-0 mb-1">💡 잘 모르겠으면 아래 버튼을 눌러요</p>
                <button onClick={useHelp} disabled={helpUsedThisQ}
                  className="btn shrink-0 py-2 px-4 bg-amber-100 text-amber-700 rounded-2xl font-bold txt-md border-2 border-amber-200 disabled:opacity-50">
                  {helpUsedThisQ ? '✅ 도움받았어요' : '🆘 도움받기 (문장 읽어주기)'}
                </button>
              </div>
            ) : (
              <div className="flex flex-col h-full justify-center w-full max-w-2xl mx-auto">
                <div className="flex-1 flex flex-col justify-center min-h-0">
                  <div className="emoji-xl mb-1 sm:mb-2">{fb.ok ? '🌟':'🤔'}</div>
                  <h2 className={"txt-3xl font-bold mb-2 sm:mb-3 " + (fb.ok ? 'text-emerald-500':'text-amber-500')}>
                    {fb.ok ? '🎉 정답이에요!' : '다시 해볼까요?'}
                  </h2>
                  {fb.ok ? (
                    <>
                      <div className="bg-emerald-50 border-2 border-emerald-100 rounded-2xl p-2 sm:p-3 mb-2 txt-md font-bold text-slate-600 italic word-keep text-center">
                        {fb.msg}
                      </div>
                      <div className="bg-green-100 rounded-2xl py-1.5 px-3 mb-2 mx-auto w-fit txt-md font-bold text-green-800">
                        📝 {fb.concept}
                      </div>
                    </>
                  ) : (
                    <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-2 sm:p-3 mb-2 txt-md font-bold text-amber-700 word-keep text-center">
                      {fb.hint}
                    </div>
                  )}
                </div>
                <button onClick={fb.ok ? nextQ : function(){ setFb(null); }}
                  className={"btn w-full py-3 shrink-0 rounded-2xl font-bold txt-2xl text-white shadow-lg " + (fb.ok ? 'bg-emerald-500 hover:bg-emerald-600':'bg-amber-400 hover:bg-amber-500')}>
                  {fb.ok ? (isRecordTime ? '🎙️ 녹음하러 가기 ▶' : '다음 문제로 ▶') : '다시 선택하기'}
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* 재도전 안내 */
  if (phase === '재도전안내') {
    return (
      <div className="w-full h-full flex flex-col">
        <Header label="💡 한 번 더!" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col items-center justify-center text-center px-4 py-3 min-h-0 overflow-hidden">
          <div className="emoji-xl mb-3 shrink-0">💡</div>
          <h2 className="txt-3xl font-bold text-slate-800 mb-3 word-keep shrink-0">포기하지 않는 탐험가가<br/>제일 멋져요!</h2>
          <div className="card card-amber p-4 max-w-md mx-auto mb-5 shrink-0">
            <p className="txt-md font-bold text-slate-600 word-keep text-center">
              아쉬운 문제를 한 번 더 풀어볼까요?
            </p>
          </div>
          <button onClick={function(){ sfx.click(soundOn); setReviewMode(true); setQIdx(0); setFb(null); setPhase('activity'); }}
            className="btn py-3 sm:py-4 px-8 sm:px-10 shrink-0 bg-orange-500 text-white rounded-2xl font-bold txt-2xl shadow-lg hover:bg-orange-600">
            🔄 다시 도전!
          </button>
        </div>
      </div>
    );
  }

  /* 녹음 */
  if (phase === 'recording') {
    const learnedWords = Array.from(new Set(history.filter(function(h){ return h.ok; }).map(function(h){ return h.word; })));
    const allWords = learnedWords.length >= 3 ? learnedWords : Array.from(new Set(learnedWords.concat(WORD_DB.slice(0,5).map(function(w){ return w.id; }))));
    const displayWords = allWords.slice(0, 5);
    const exWord = WORD_DB.find(function(w){ return w.id === recWord; }) || {};
    const currentText = inputMode === 'voice' ? sttText : typedText;
    const rubricCheck = currentText && currentText.indexOf(recWord) >= 0;
    const showSelfEval = (recStep === 'done') || (inputMode === 'keyboard' && typedText.trim());

    return (
      <div className="w-full h-full flex flex-col" style={{ background:'#f0fdf4' }}>
        <Header label={'🎙️ 녹음 ' + (currentRecIdx+1) + '/' + recordCount} soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col px-2 sm:px-4 py-2 min-h-0 overflow-hidden">
          <div className="card card-green flex-1 flex flex-col p-3 sm:p-4 min-h-0 max-w-3xl w-full mx-auto">

            <p className="txt-2xl font-bold text-green-600 text-center shrink-0">꾸며주는 말로 문장 만들기!</p>
            <p className="txt-md font-bold text-amber-600 text-center mb-2 shrink-0 word-keep">
              ✨ 아래 단어를 골라서 멋진 문장을 만들어요!
            </p>

            {/* 단어 선택 */}
            <div className="flex flex-wrap gap-1.5 sm:gap-2 justify-center mb-2 shrink-0">
              {displayWords.map(function(w){
                return (
                  <button key={w} onClick={function(){ sfx.click(soundOn); setRecWord(w); }}
                    className={"btn px-3 py-1.5 sm:py-2 rounded-2xl font-bold txt-md transition-all " + (recWord === w ? 'bg-green-500 text-white scale-105':'bg-white text-green-700')}
                    style={{ border: '3px solid ' + (recWord === w ? '#22c55e' : '#bbf7d0') }}>
                    {w}
                  </button>
                );
              })}
            </div>

            {/* 예시 문장 */}
            {recWord && (
              <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-2 sm:p-3 mb-2 shrink-0">
                <p className="txt-md font-bold text-amber-700 text-center word-keep">
                  📝 예시: "{exWord.ex || (josa.eulReul(recWord) + ' 넣어 문장을 만들어요')}"
                </p>
              </div>
            )}

            {/* 입력 모드 토글 */}
            <div className="flex gap-2 mb-2 shrink-0">
              <button onClick={function(){ setInputMode('voice'); }}
                className={"btn flex-1 py-2 rounded-2xl font-bold txt-md " + (inputMode === 'voice' ? 'bg-green-500 text-white':'bg-slate-100 text-slate-500')}>
                🎙️ 녹음
              </button>
              <button onClick={function(){ setInputMode('keyboard'); }}
                className={"btn flex-1 py-2 rounded-2xl font-bold txt-md " + (inputMode === 'keyboard' ? 'bg-green-500 text-white':'bg-slate-100 text-slate-500')}>
                ⌨️ 키보드
              </button>
            </div>

            {/* 입력 영역 */}
            <div className="flex-1 flex flex-col min-h-0 mb-2">
              {inputMode === 'voice' ? (
                <>
                  <div className="bg-blue-50 border-2 border-blue-200 rounded-2xl p-2 sm:p-3 mb-2 shrink-0">
                    <p className="txt-md font-bold text-slate-500 mb-1">📝 받아쓰기 (실시간)</p>
                    <p className="txt-md font-bold text-blue-700 word-keep" style={{ minHeight: '1.5em' }}>
                      {sttText}
                      {interimText && <span className="text-blue-400 italic"> {interimText}</span>}
                      {!sttText && !interimText && <span className="text-slate-300">말한 내용이 여기에 보여요</span>}
                    </p>
                  </div>
                  <div className="shrink-0">
                    {recStep === 'idle' && (
                      <button onClick={startRec}
                        className="btn pulse-red w-full py-3 sm:py-4 bg-rose-500 text-white rounded-2xl font-bold txt-2xl shadow-lg">
                        🔴 녹음 시작!
                      </button>
                    )}
                    {recStep === 'rec' && (
                      <div className="flex flex-col gap-2">
                        <p className="txt-xl font-bold text-rose-500 animate-pulse text-center">🔴 녹음 중...</p>
                        <button onClick={stopRec}
                          className="btn w-full py-3 bg-slate-800 text-white rounded-2xl font-bold txt-xl shadow-lg">
                          ⏹ 다 말했어요!
                        </button>
                      </div>
                    )}
                    {recStep === 'done' && (
                      <div className="flex flex-col gap-2">
                        <p className="txt-xl font-bold text-emerald-600 text-center">✅ 녹음 완료!</p>
                        {audioUrl && <audio controls src={audioUrl} className="w-full rounded-xl h-10"/>}
                        <button onClick={playFinalSentence}
                          className="btn py-2 bg-blue-500 text-white rounded-xl font-bold txt-md">
                          🔊 완성 문장 듣기
                        </button>
                      </div>
                    )}
                  </div>
                </>
              ) : (
                <div className="shrink-0">
                  <textarea value={typedText} onChange={function(e){ setTypedText(e.target.value); }}
                    placeholder={josa.eulReul(recWord) + ' 넣어 문장을 적어보세요...'}
                    className="text-input w-full p-3 bg-blue-50 border-2 border-blue-200 rounded-2xl resize-none"
                    rows={3}/>
                  <button onClick={playFinalSentence} disabled={!typedText.trim()}
                    className="btn w-full mt-2 py-2 bg-blue-500 text-white rounded-xl font-bold txt-md disabled:bg-slate-300">
                    🔊 완성 문장 듣기
                  </button>
                </div>
              )}
            </div>

            {/* 자기평가 */}
            {showSelfEval && (
              <div className="bg-pink-50 border-2 border-pink-200 rounded-2xl p-2 sm:p-3 shrink-0">
                <div className={"mb-1.5 p-1.5 rounded-xl txt-md font-bold text-center " + (rubricCheck ? 'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700')}>
                  {rubricCheck ? ('✅ "' + recWord + '" ' + (hasJongseong(recWord) ? '이' : '가') + ' 들어있어요!') : ('💡 "' + recWord + '" ' + (hasJongseong(recWord) ? '을' : '를') + ' 꼭 넣어주세요')}
                </div>
                <p className="text-center txt-md font-bold text-pink-700 mb-1.5">
                  📢 들어보고 별점을 매겨요!
                </p>
                <StarRating value={recSelfStars} onChange={function(s){ setRecSelfStars(s); sfx.click(soundOn); }} size="normal"/>
                {recSelfStars > 0 && recSelfStars <= 3 && (
                  <p className="text-center txt-sm font-bold text-amber-600 mt-1">💡 다시 녹음을 추천해요!</p>
                )}
                <div className="flex gap-2 mt-2">
                  <button onClick={retryRec}
                    className="btn flex-1 py-2 bg-slate-100 text-slate-600 rounded-2xl font-bold txt-md">
                    🔄 다시하기
                  </button>
                  <button onClick={function(){ sfx.click(soundOn); awardSticker('star'); setTimeout(submitRecSelfEval, 1200); }}
                    disabled={recSelfStars === 0 || (inputMode === 'voice' && !sttText.trim()) || (inputMode === 'keyboard' && !typedText.trim())}
                    className="btn flex-[2] py-2 bg-green-600 text-white rounded-2xl font-bold txt-md shadow-lg hover:bg-green-700 disabled:bg-slate-300">
                    {currentRecIdx < recordCount - 1 ? '다음 문제로 ▶' : '제출하기 🏆'}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
        <RewardSticker show={showReward} type={rewardType} onEnd={function(){ setShowReward(false); }}/>
      </div>
    );
  }

  /* 배움 정리 / 성찰 */
  if (phase === 'reflection') {
    const learned = Array.from(new Set(history.filter(function(h){ return h.ok; }).map(function(h){ return h.word; })));
    const correctCount = history.filter(function(h){ return h.ok; }).length;
    const reflectionItems = [
      { key:'best', label:'😊 오늘 가장 잘한 점은?', placeholder:'예) 살금살금을 잘 알게 됐어요' },
      { key:'hard', label:'🤔 어려웠던 점은?', placeholder:'예) 받침이 어려웠어요' },
      { key:'next', label:'🎯 다음에 해보고 싶은 건?', placeholder:'예) 더 많은 문장을 만들고 싶어요' }
    ];
    return (
      <div className="w-full h-full flex flex-col bg-white">
        <Header label="🌱 배움 정리" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col px-2 sm:px-4 py-2 min-h-0 overflow-hidden">
          <div className="w-full max-w-3xl mx-auto flex-1 flex flex-col min-h-0">
            <h2 className="txt-2xl font-bold text-slate-800 mb-1 text-center word-keep shrink-0">🌱 오늘 배운 것을 정리해봐요</h2>

            <div className="card card-green p-2 sm:p-3 mb-2 shrink-0">
              <div className="grid grid-cols-3 gap-2 text-center">
                <div>
                  <p className="txt-md font-bold text-slate-400">맞춘 문제</p>
                  <p className="txt-2xl font-bold text-emerald-500">{correctCount}/{qs.length}</p>
                </div>
                <div>
                  <p className="txt-md font-bold text-slate-400">배운 단어</p>
                  <p className="txt-2xl font-bold text-green-500">{learned.length}개</p>
                </div>
                <div>
                  <p className="txt-md font-bold text-slate-400">도움받기</p>
                  <p className="txt-2xl font-bold text-amber-500">{totalHelp}번</p>
                </div>
              </div>
            </div>

            <div className="flex-1 flex flex-col gap-2 min-h-0 overflow-y-auto scroll-y pr-1">
              {reflectionItems.map(function(item){
                const isRecording = reflectionRecKey === item.key;
                const displayText = (reflection[item.key] || '') + (isRecording && reflectionInterim ? ' ' + reflectionInterim : '');
                return (
                  <div key={item.key} className="card card-blue p-2 sm:p-3 shrink-0">
                    <label className="block txt-md font-bold text-blue-700 mb-1">{item.label}</label>
                    <textarea value={displayText}
                      onChange={function(e){
                        const val = e.target.value;
                        setReflection(function(r){ return Object.assign({}, r, { [item.key]: val }); });
                      }}
                      placeholder={item.placeholder}
                      className="text-input w-full p-2 bg-white border-2 border-slate-100 rounded-xl resize-none"
                      rows={2}/>
                    <div className="flex gap-2 mt-1.5">
                      {!isRecording ? (
                        <button onClick={function(){ startReflectionRec(item.key); }}
                          className="btn flex-1 py-1.5 bg-rose-50 text-rose-600 border-2 border-rose-200 rounded-xl font-bold txt-md">
                          🎙️ 말로 입력
                        </button>
                      ) : (
                        <button onClick={stopReflectionRec}
                          className="btn flex-1 py-1.5 bg-rose-500 text-white rounded-xl font-bold txt-md animate-pulse">
                          ⏹ 다 말했어요
                        </button>
                      )}
                      {reflection[item.key] && (
                        <button onClick={function(){
                          setReflection(function(r){ return Object.assign({}, r, { [item.key]: '' }); });
                        }}
                          className="btn px-3 py-1.5 bg-slate-100 text-slate-600 rounded-xl font-bold txt-md">
                          🗑️
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>

            <button onClick={function(){ sfx.click(soundOn); setPhase('self_rating'); }}
              className="btn w-full py-3 bg-green-500 text-white rounded-2xl font-bold txt-2xl shadow-lg hover:bg-green-600 mt-2 shrink-0">
              다음 ➡️
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* 최종 별점 */
  if (phase === 'self_rating') {
    return (
      <div className="w-full h-full flex flex-col bg-white">
        <Header label="⭐ 나의 다짐 평가" soundOn={soundOn} toggleSound={toggleSound} onHome={goHome}/>
        <div className="flex-1 flex flex-col items-center justify-center px-4 py-3 text-center min-h-0 overflow-hidden">
          <h2 className="txt-3xl font-bold text-slate-800 mb-2 word-keep shrink-0">오늘 꾸며주는 말<br/>공부, 어땠나요?</h2>
          <p className="txt-md font-bold text-slate-500 mb-4 sm:mb-6 shrink-0">별표로 알려줘요!</p>
          <div className="mb-4 sm:mb-6 shrink-0">
            <StarRating value={finalStars} onChange={function(s){ setFinalStars(s); sfx.click(soundOn); }} size="large"/>
          </div>
          {finalStars > 0 && finalStars <= 3 && (
            <div className="card card-amber p-3 mb-3 max-w-md shrink-0">
              <p className="txt-md font-bold text-amber-600 word-keep text-center">
                💡 별 3개 이하네요. 한 번 더 활동을 해볼까요?
              </p>
            </div>
          )}
          {finalStars > 0 && (
            <div className="flex gap-2 sm:gap-3 w-full max-w-md shrink-0">
              {finalStars <= 3 && (
                <button onClick={function(){ sfx.click(soundOn); handleLevel(qs.length); }}
                  className="btn flex-1 py-3 sm:py-4 bg-amber-500 text-white rounded-2xl font-bold txt-md shadow-lg hover:bg-amber-600">
                  🔄 다시 활동
                </button>
              )}
              <button onClick={function(){ sfx.click(soundOn); awardSticker('flower'); setTimeout(saveResult, 1300); }}
                className="btn flex-[2] py-3 sm:py-4 bg-green-500 text-white rounded-2xl font-bold txt-md shadow-lg hover:bg-green-600">
                결과 제출 ➡️
              </button>
            </div>
          )}
        </div>
        <RewardSticker show={showReward} type={rewardType} onEnd={function(){ setShowReward(false); }}/>
      </div>
    );
  }

  /* 수료증 */
  if (phase === 'report') {
    const learned = Array.from(new Set(history.filter(function(h){ return h.ok; }).map(function(h){ return h.word; })));
    const correctCount = history.filter(function(h){ return h.ok; }).length;
    const pct = qs.length > 0 ? Math.round((correctCount/qs.length)*100) : 100;

    return (
      <div className="w-full h-full flex flex-col" style={{ background:'linear-gradient(145deg,#f0fdf4 0%,#ecfeff 100%)' }}>
        {saving && (
          <div className="absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-50">
            <div className="w-16 h-16 border-4 border-green-100 border-t-green-500 rounded-full animate-spin mb-4"/>
            <p className="txt-2xl font-bold text-slate-700">저장 중이에요...</p>
          </div>
        )}

        <div className="flex items-center justify-between px-3 sm:px-4 py-2 shrink-0">
          <h1 className="txt-2xl font-bold text-slate-900">🏆 수료증</h1>
          <button onClick={toggleSound}
            className={"btn w-12 h-12 rounded-2xl border-2 shadow-sm txt-2xl " + (soundOn ? 'bg-green-100 text-green-600 border-green-200':'bg-white text-slate-300 border-slate-100')}>
            {soundOn ? '🔊':'🔇'}
          </button>
        </div>

        <div className="flex flex-col md:flex-row gap-2 sm:gap-3 flex-1 px-2 sm:px-4 pb-2 min-h-0 overflow-hidden">
          <div className="card card-green flex-1 p-2 sm:p-3 flex flex-col items-center justify-center text-center min-h-0">
            <div className="emoji-lg shrink-0">📝</div>
            <h3 className="txt-2xl font-bold text-slate-800 shrink-0">{student} 탐험가!</h3>
            <p className="txt-md font-bold text-slate-500 italic my-1 word-keep shrink-0">
              꾸며주는 말을 사용하여<br/>문장을 생생하게 만드는<br/>실력을 갖추었습니다.
            </p>
            <div className="flex gap-1 justify-center my-1 shrink-0">
              {[1,2,3,4,5].map(function(s){
                return <span key={s} className={s <= finalStars ? '':'opacity-20 grayscale'} style={{ fontSize:'clamp(1.4rem,3.5vmin,2.2rem)' }}>⭐</span>;
              })}
            </div>
            <div className="bg-green-100 rounded-2xl py-1 px-3 inline-block mb-1 shrink-0">
              <span className="txt-md font-bold text-green-700">{correctCount}/{qs.length} ({pct}%)</span>
            </div>
            <p className="txt-md font-bold text-slate-400 shrink-0">{new Date().toLocaleDateString('ko-KR')}</p>
            {totalHelp > 0 && <p className="txt-md font-bold text-amber-600 mt-0.5 shrink-0">💡 도움받기 {totalHelp}번</p>}
          </div>

          {learned.length > 0 && (
            <div className="card card-teal flex-1 p-2 sm:p-3 flex flex-col min-h-0">
              <p className="txt-xl font-bold text-teal-600 mb-2 text-center shrink-0">✨ 오늘 배운 꾸며주는 말</p>
              <div className="grid grid-cols-2 gap-1.5 sm:gap-2 flex-1 content-start overflow-y-auto scroll-y pr-1">
                {learned.map(function(w, i){
                  const wd = WORD_DB.find(function(d){ return d.id === w; }) || {};
                  return (
                    <div key={i} className="bg-teal-50 border-2 border-teal-100 rounded-2xl px-2 py-1.5 flex items-center justify-center gap-1.5">
                      <span style={{ fontSize:'clamp(1.3rem,3vmin,1.8rem)' }}>{wd.emoji || '✨'}</span>
                      <span className="txt-md font-bold text-slate-700">{w}</span>
                    </div>
                  );
                })}
              </div>
              {stickers.length > 0 && (
                <div className="shrink-0 mt-2">
                  <p className="txt-md font-bold text-pink-600 mb-1 text-center">🏅 받은 스티커: {stickers.length}개</p>
                  <div className="flex flex-wrap gap-1 justify-center">
                    {stickers.slice(0, 10).map(function(t, i){
                      return <span key={i} className="emoji-md">{t === 'flower' ? '🌸' : t === 'heart' ? '💖' : '⭐'}</span>;
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        <div className="flex gap-2 px-2 sm:px-4 pb-3 shrink-0">
          <button onClick={function(){ sfx.click(soundOn); downloadCert(student, learned, finalStars, totalHelp); }}
            className="btn flex-1 py-3 bg-green-600 text-white rounded-2xl font-bold txt-xl shadow-lg hover:bg-green-700">
            🖼️ 수료증 저장
          </button>
          <button onClick={function(){ window.location.reload(); }}
            className="btn flex-1 py-3 bg-slate-800 text-white rounded-2xl font-bold txt-xl shadow-lg hover:bg-slate-700">
            🏠 처음으로
          </button>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
